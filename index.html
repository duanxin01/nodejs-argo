<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索未知 | 独一无二的诗意空间</title>
    <style>
        /* 全局现代极简重置 */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", sans-serif;
            background-color: #0a0a0c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态艺术渐变背景 */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(80px);
            opacity: 0.8;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.6) 0%, rgba(99, 102, 241, 0) 70%);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.4) 0%, rgba(236, 72, 153, 0) 70%);
            bottom: -20%;
            right: -10%;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.4) 0%, rgba(45, 212, 191, 0) 70%);
            top: 40%;
            left: 30%;
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(4vw, -6vh) scale(1.1); }
            100% { transform: translate(-2vw, 4vh) scale(0.9); }
        }

        /* 艺术玻璃拟态卡片容器 */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 480px;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.3s;
        }

        /* 顶部独特微标 */
        .logo-area {
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-icon::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
        }

        .container:hover .logo-icon {
            transform: rotate(180deg);
        }

        /* 文字排版与优雅间距 */
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            text-indent: 0.3em; /* 平衡字间距引起的偏心 */
            background: linear-gradient(120deg, #ffffff, rgba(255, 255, 255, 0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.8;
            letter-spacing: 0.1em;
            margin-bottom: 2.5rem;
        }

        /* 呼吸感细腻按钮 */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            background: #ffffff;
            color: #0a0a0c;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-indent: 0.2em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.9);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 入场动画 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 极简页脚 */
        footer {
            position: absolute;
            bottom: 2rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.1em;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <div class="logo-area">
            <div class="logo-icon"></div>
        </div>
        <h1>不期而遇</h1>
        <p>在数字荒野的深处，每一个像素都是一颗星辰。静随光影流转，捕捉那些越过视线、沉淀于心底的温柔瞬间。</p>
        <a href="#" class="btn" id="exploreBtn">开启旅程</a>
    </main>

    <footer>
        &copy; 2026 DESIGNED WITH SOUL. ALL RIGHTS RESERVED.
    </footer>

    <script>
        // 为页面添加鼠标移动时的轻微视差重力感
        const container = document.querySelector('.container');
        const orbs = document.querySelectorAll('.orb');

        window.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX / window.innerWidth - 0.5) * 30; // 限制移动幅度
            const mouseY = (e.clientY / window.innerHeight - 0.5) * 30;

            // 卡片轻微反向倾斜
            container.style.transform = `translate3d(${mouseX * 0.2}px, ${mouseY * 0.2}px, 0)`;
            
            // 背景光球随鼠标产生轻微位移
            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 0.4;
                orb.style.transform = `translate3d(${mouseX * speed}px, ${mouseY * speed}px, 0)`;
            });
        });

        // 按钮点击动效
        document.getElementById('exploreBtn').addEventListener('click', (e) => {
            e.preventDefault();
            alert('恭喜你，触发了隐藏的量子通道。独特的精彩即将为您呈现。');
        });
    </script>
</body>
</html>
